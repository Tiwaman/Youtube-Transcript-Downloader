<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TranscriptGrab — YouTube Transcript Downloader</title>
  <meta name="description" content="Extract, search, copy and download YouTube video transcripts instantly. Free, fast, no sign-up required." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Hero ─────────────────────────────────── -->
    <header class="hero">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#logoGrad)"/>
          <polygon points="10,7 17,12 10,17" fill="#fff"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24">
              <stop offset="0%" stop-color="#ff3366"/>
              <stop offset="100%" stop-color="#ff6633"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>TranscriptGrab</h1>
      </div>
      <p class="tagline">Extract YouTube transcripts instantly — copy, search &amp; download.</p>
    </header>

    <!-- ── Input ────────────────────────────────── -->
    <section class="input-section">
      <div class="input-wrapper" id="inputWrapper">
        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <input
          type="text"
          id="urlInput"
          placeholder="Paste a YouTube URL or video ID…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="fetch-btn" id="fetchBtn">
          <span class="fetch-btn-text">Extract</span>
          <svg class="fetch-btn-loader" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </button>
      </div>
      <p class="hint">Supports youtube.com, youtu.be, shorts &amp; embed links</p>
    </section>

    <!-- ── Error ────────────────────────────────── -->
    <div class="error-banner" id="errorBanner" style="display: none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="errorText"></span>
    </div>

    <!-- ── Video Preview ────────────────────────── -->
    <div class="video-preview" id="videoPreview" style="display: none;">
      <img class="thumbnail" id="thumbnail" alt="Video thumbnail" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" />
      <div class="video-info">
        <h2 class="video-title" id="videoTitle"></h2>
        <span class="video-channel" id="videoChannel"></span>
      </div>
    </div>

    <!-- ── Toolbar ──────────────────────────────── -->
    <div class="toolbar" id="toolbar" style="display: none;">
      <div class="toolbar-left">
        <button class="tool-btn" id="copyBtn" title="Copy transcript">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
        <button class="tool-btn" id="downloadTxt" title="Download as .txt">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          .TXT
        </button>
        <button class="tool-btn" id="downloadSrt" title="Download as .srt">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          .SRT
        </button>
      </div>
      <div class="toolbar-right">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search…" />
        </div>
        <label class="toggle" title="Toggle timestamps">
          <input type="checkbox" id="timestampToggle" checked />
          <span class="toggle-slider"></span>
          <span class="toggle-label">Timestamps</span>
        </label>
      </div>
    </div>

    <!-- ── Transcript ───────────────────────────── -->
    <div class="transcript-container" id="transcriptContainer" style="display: none;">
      <div class="transcript-lines" id="transcriptLines"></div>
    </div>

    <!-- ── Stats ────────────────────────────────── -->
    <div class="stats" id="stats" style="display: none;">
      <div class="stat">
        <span class="stat-value" id="wordCount">0</span>
        <span class="stat-label">Words</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="charCount">0</span>
        <span class="stat-label">Characters</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="lineCount">0</span>
        <span class="stat-label">Lines</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="duration">0:00</span>
        <span class="stat-label">Duration</span>
      </div>
    </div>

    <!-- ── Footer ───────────────────────────────── -->
    <footer class="footer">
      <p>Built with ❤️ — Paste any YouTube link and get the full transcript in seconds.</p>
    </footer>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
